<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Craft | San Diego's Premier Self-Pour Craft Beer Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a3a3a;
            --primary-light: #2a5a5a;
            --primary-dark: #0f2424;
            --gold: #c9a962;
            --gold-light: #e0c987;
            --cream: #faf8f5;
            --white: #ffffff;
            --gray-100: #f7f7f7;
            --gray-200: #e5e5e5;
            --gray-600: #666666;
            --gray-800: #333333;
            --black: #0a0a0a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--gray-800);
            line-height: 1.6;
            background: var(--white);
            overflow-x: hidden;
        }

        /* LVRG Claim Bar */
        .claim-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
            font-size: 13px;
        }

        .claim-bar-text {
            color: #888;
            font-weight: 400;
        }

        .claim-bar-text span {
            color: var(--white);
            font-weight: 500;
        }

        .claim-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--black);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .claim-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.4);
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 42px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(26, 58, 58, 0.1);
            transition: all 0.3s ease;
        }

        .nav.scrolled {
            padding: 12px 48px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gray-800);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: var(--primary);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
        }

        .nav-cta:hover {
            background: transparent;
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            padding: 160px 48px 80px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--cream) 0%, var(--white) 50%, rgba(201, 169, 98, 0.05) 100%);
        }

        .hero-bg-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            opacity: 0.6;
            background: 
                radial-gradient(circle at 70% 30%, rgba(26, 58, 58, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(201, 169, 98, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 30% 70%, rgba(26, 58, 58, 0.05) 0%, transparent 30%);
        }

        .hero-geometric {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
        }

        .geo-circle-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            top: 50px;
            right: 50px;
            opacity: 0.6;
            animation: float 8s ease-in-out infinite;
        }

        .geo-circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            top: 100px;
            right: 100px;
            opacity: 0.9;
            animation: float 6s ease-in-out infinite reverse;
        }

        .geo-circle-3 {
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border-radius: 50%;
            top: 180px;
            right: 180px;
            animation: pulse 4s ease-in-out infinite;
        }

        .geo-dots {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 0;
            right: 0;
            background-image: radial-gradient(var(--primary) 2px, transparent 2px);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        .beer-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 120px;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 30%, rgba(201, 169, 98, 0.8) 100%);
            border-radius: 5px 5px 10px 10px;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.1);
        }

        .beer-icon::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 5px;
            right: 5px;
            height: 20px;
            background: #fff;
            border-radius: 5px 5px 0 0;
            opacity: 0.8;
        }

        .beer-icon::after {
            content: '';
            position: absolute;
            top: 20px;
            right: -25px;
            width: 20px;
            height: 50px;
            border: 4px solid var(--cream);
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .hero-content {
            max-width: 650px;
            position: relative;
            z-index: 10;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--gold);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.15);
        }

        .hero-badge::before {
            content: '🍺';
            font-size: 16px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(42px, 5vw, 68px);
            font-weight: 700;
            color: var(--primary);
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--gold);
            position: relative;
        }

        .hero-sub {
            font-size: 18px;
            color: var(--gray-600);
            margin-bottom: 40px;
            line-height: 1.8;
            max-width: 500px;
        }

        .hero-ctas {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(26, 58, 58, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(26, 58, 58, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Social Proof Bar */
        .social-proof {
            background: var(--primary);
            padding: 48px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            position: relative;
            overflow: hidden;
        }

        .social-proof::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .stat {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Services Section */
        .services {
            padding: 120px 48px;
            background: var(--white);
        }

        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 64px;
        }

        .section-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .section-desc {
            font-size: 17px;
            color: var(--gray-600);
            line-height: 1.8;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: var(--cream);
            border-radius: 24px;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid transparent;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px rgba(26, 58, 58, 0.12);
            border-color: rgba(201, 169, 98, 0.2);
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            font-size: 32px;
        }

        .service-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .service-card p {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .service-link {
            color: var(--gold);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: gap 0.3s ease;
        }

        .service-link:hover {
            gap: 12px;
        }

        /* Testimonials Section */
        .testimonials {
            padding: 120px 48px;
            background: linear-gradient(180deg, var(--gray-100) 0%, var(--white) 100%);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-card {
            background: var(--white);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .testimonial-card::before {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            color: var(--gold);
            opacity: 0.2;
            position: absolute;
            top: 20px;
            left: 30px;
            line-height: 1;
        }

        .stars {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .star {
            color: var(--gold);
            font-size: 18px;
        }

        .testimonial-text {
            font-size: 17px;
            color: var(--gray-800);
            line-height: 1.9;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .author-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 18px;
        }

        .author-info h4 {
            font-weight: 600;
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 2px;
        }

        .author-info span {
            font-size: 13px;
            color: var(--gray-600);
        }

        /* CTA Banner */
        .cta-banner {
            padding: 100px 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .cta-content {
            position: relative;
            z-index: 1;
        }

        .cta-banner h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 4vw, 52px);
            color: var(--white);
            margin-bottom: 20px;
        }

        .cta-banner p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 500px;
            margin: 0 auto 36px;
        }

        .cta-banner .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--primary-dark);
        }

        /* Footer */
        .footer {
            background: var(--black);
            padding: 80px 48px 40px;
            color: var(--white);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .footer-brand .logo {
            color: var(--white);
            margin-bottom: 20px;
            display: inline-block;
        }

        .footer-brand p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.8;
            max-width: 300px;
        }

        .footer-col h4 {
            color: var(--gold);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col li {
            margin-bottom: 12px;
        }

        .footer-col a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-col a:hover {
            color: var(--gold);
        }

        .footer-col p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.8;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 40px;
            text-align: center;
        }

        .footer-bottom p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .footer-bottom a {
            color: var(--gold);
            text-decoration: none;
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            font-family: 'Inter', sans-serif;
        }

        .chat-toggle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(26, 58, 58, 0.35);
            transition: all 0.3s ease;
        }

        .chat-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(26, 58, 58, 0.45);
        }

        .chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: var(--white);
        }

        .chat-toggle .close-icon {
            display: none;
        }

        .chat-widget.active .chat-toggle .chat-icon {
            display: none;
        }

        .chat-widget.active .chat-toggle .close-icon {
            display: block;
        }

        .chat-panel {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 360px;
            height: 480px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        .chat-widget.active .chat-panel {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 18px;
            font-family: 'Playfair Display', serif;
        }

        .chat-header-info h3 {
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-info span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header-info span::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--gray-100);
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .message-bubble {
            background: var(--white);
            padding: 14px 18px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            max-width: 240px;
        }

        .message-bubble p {
            font-size: 14px;
            color: var(--gray-800);
            line-height: 1.6;
            margin: 0;
        }

        .message-time {
            font-size: 11px;
            color: var(--gray-600);
            margin-top: 6px;
        }

        .chat-input-area {
